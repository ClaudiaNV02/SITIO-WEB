<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payaso Figuras</title>

    <style>

        *{
            margin: 0px;
            padding: 0px;
        }

        .contenedor{
            width: 400px;
            height: 700px;
            background-color: skyblue;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
        }
        .gorrito{
            width: 120px;
            height: 120px;
            background-color: red;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            left: 140px;
            top: 40px;
            z-index: 2;
        }
        .bolita{
            width: 35px;
            height: 35px;
            background-color: yellow;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            left: 183px;
            top: 20px;
            z-index: 2;
        }
        .linea{
            width: 120px;
            height: 20px;
            background-color: blue;
            position: absolute;
            left: 140px;
            top: 140px;
            z-index: 3;
        }
        .cabeza{
            width: 140px;
            height: 140px;
            background-color: peachpuff;
            clip-path: circle(45% at 45% 45%);
            position: absolute;
            left: 135px;
            top: 125px;
            z-index: 1;
        }

        .cabello1{
            width: 60px;
            height: 60px;
            background-color: orange;
            clip-path: circle(40% at 40% 40%);
            position: absolute;
            left: 110px;
            top: 149px;
        }
        .cabello2{
            width: 60px;
            height: 60px;
            background-color: orange;
            clip-path: circle(40% at 40% 40%);
            position: absolute;
            left: 240px;
            top: 149px;
        }
        .ojoI{
            width: 20px;
            height: 20px;
            background-color: black;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            left: 165px;
            top: 175px;
            z-index: 2;
        }

        .ojoD{
            width: 20px;
            height: 20px;
            background-color: black;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            left: 215px;
            top: 175px;
            z-index: 2;
        }

        .nariz{
            width: 40px;
            height: 40px;
            background-color: red;
            clip-path: circle(40% at 40% 50%);
            position: absolute;
            left: 185px;
            top: 195px;
            z-index: 2;
        }
        .cuelloI{
            width: 60px;
            height: 60px;
            background-color: red;
            clip-path: polygon(0 0, 90% 50%, 0 100%);
            position: absolute;
            left: 145px;
            top: 220px;
            z-index: 2;
           
        }
        .cuello{
            width: 60px;
            height: 60px;
            background-color: red;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            position: absolute;
            left: 195px;
            top: 220px;
            z-index: 3;
        }

        .centro{
            width: 30px;
            height: 30px;
            background-color: rgb(89, 4, 226);
            clip-path: circle(35% at 35% 50%);
            position: absolute;
            left: 185px;
            top: 235px;
            z-index: 4;
        }
        .cuerpo{
            width: 180px;
            height: 250px;
            background-color: yellow;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            left: 105px;
            top: 220px;
            z-index: 0;
        }

        .boton1,.boton2,.boton3{
            width: 35px;
            height: 35px;
            background-color: blue;
            clip-path: circle(30% at 30% 50%);
            position: absolute;
            left: 183px;
            z-index: 2;
        }
        .boton1{
            top: 310px;
        }
        .boton2{
            top: 360px;
        }
        .boton3{
            top: 410px;
        }
        .brazoD {
            width: 80px;
            height: 100px;
            background-color: blueviolet;
            clip-path: polygon(27% 25%, 86% 25%, 87% 64%, 28% 65%, 6% 46%);
            position: absolute;
            left: 100px;
            top: 270px;
        }
        .brazoI {
            width: 80px;
            height: 100px;
            background-color: rgb(236, 79, 7);
            clip-path: polygon(0 23%, 70% 23%, 86% 41%, 73% 64%, 0 63%);
            position: absolute;
            left: 220px;
            top: 270px;
        }


        .pieI{
            width: 90px;
            height: 45px;
            background-color: black;
            clip-path: ellipse(50% 50% at 50% 50%);
            position: absolute;
            left: 110px;
            top: 465px;
        }

        .pieD{
            width: 90px;
            height: 45px;
            background-color: black;
            clip-path: ellipse(50% 50% at 50% 50%);
            position: absolute;
            left: 200px;
            top: 465px;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <div class="gorrito"></div>
        <div class="bolita"></div>
        <div class="linea"></div>

        <div class="cabello1"></div>
        <div class="cabello2"></div>

        <div class="cabeza"></div>

        <div class="ojoI"></div>
        <div class="ojoD"></div>

        <div class="nariz"></div>

        <div class="boca"></div>
        <div class="sonrisa"></div>

        <div class="cuelloI"></div>
        <div class="cuello"></div>
        <div class="centro"></div>

        <div class="brazoI"></div>
        <div class="brazoD"></div>

        <div class="cuerpo"></div>
        

        <div class="boton1"></div>
        <div class="boton2"></div>
        <div class="boton3"></div>

        <div class="pieI"></div>
        <div class="pieD"></div>

    </div>

</body>
<a href="../index.html">
    <button>VOLVER</button>
</a>
</html>
