<html>
<head>
        <title>TURISMO PERU</title>
            <style>
              *{
                  padding:0px;
                  margin:0px;
                  text-align:center;
                }
            body{
              background-color: rgb(95, 214, 230);
            }
            .contenedor{
                width: 800px; /*ancho*/
                height: 300px; /*alto*/
                border: 1px solid black;
                position: relative;/*provoca el centrado con div*/
                margin: 0 auto; /*centrado del contenedor*/
                margin-top: 100;
                overflow: hidden;
                background-size: cover;
            }
            .tarjeta1,.tarjeta2,.tarjeta3,.tarjeta4{
                width: 200px; /*dimension del cuadro*/
                height: 300px;
                position: absolute; /*interno*/
                top: -300px;
                background-size: cover;
               
            }
            .tarjeta1{
              background-image: url(img/mar.jpg);
              left: 0px;
              animation: tarjeta1 3s 1 forwards ;
            }  
            .tarjeta2{
              background-image: url(img/costa.jpg);
              left: 200px;
              animation: tarjeta1 3s 1 forwards 3s;
            }  
            .tarjeta3{
              background-image: url(img/sierra.jpg);
              left: 400px;
              animation: tarjeta1 3s 1 forwards 6s;

            }  
            .tarjeta4{
              background-image: url(img/selva.jpg);
              left: 600px;
              animation: tarjeta1 3s 1 forwards 9s ;
            }  
            @keyframes tarjeta1{
                0%{
                   
                   top:-300px; /*arriba*/
                   transform: rotate(180deg);
                }
                50%{
                    top: 300px;
                }
                100%{
                    top:0%
                }
            }
            /*EVENTOS*/
           .tarjeta1:hover{
              transition:  1s;
              scale:1.2;
              z-index:1;
            }
            .tarjeta2:hover{
              transition:  1s;
              scale:1.2;
              z-index:1;
            }
            .tarjeta3:hover{
              transition:  1s;
              scale:1.2;
              z-index:1;
            }
            .tarjeta4:hover{
              transition:  1s;
              scale:1.2;
              z-index:1;
            }
                
        </style>

</head>
<body>
    <div class="Contenedor">
        <div class="tarjeta1"></div>
        <div class="tarjeta2"></div>
        <div class="tarjeta3"></div>
        <div class="tarjeta4"></div>
    </div>
     
</body>
<a href="../index.html">
    <button>VOLVER</button>
</a>
</html>
