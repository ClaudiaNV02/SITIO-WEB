<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFECTO PARALLAX</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        body{
            background-color: black;
        }
        .contenedor{
            width: 400px;
            height: 700px;
            border:1px solid white;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }
        .vapor{
            width: 200%;
            position: absolute;
            z-index: 4;
            top: 400px;
            left: -100px;
            animation: vapor 10s 1 forwards;
        }
        @keyframes vapor{
            from{
                left: 0px;

            }
            to{
                left: -200px;
            }
        }
        .persona{
            width: 800px;
            position: absolute;
            left:-200px;
            top:200px;
            z-index: 3;
            animation: persona 15s 1 forwards;
        }
        @keyframes persona {
            from{
                top:100px;
                scale: 100%;
                filter: grayscale(100%)
            }
            to{
                top: 200px;
                scale: 120%;
                filter: grayscale(0%)
            }
        }
        .paisaje{
            width: 600px;
            position: absolute;
            left:-150px;
            z-index: 2;
            animation: paisaje 20s 1  forwards;
        }
        @keyframes paisaje {
            from{
                top:-100px;
                filter: blur(3px);
            }
            to{
                top: -70px;
                filter: blur(opx);
            }
        }
        .cielo{
            width: 700px;
            position: absolute;
            left:-150px;
            z-index: 1;
            animation: cielo 30s 1 forwards;
        }
        @keyframes cielo {
            from{
                scale: 100%;
                filter: blur(4px);
            }
            to{
                scale:150%;
                filter: blur(0px);
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img class="vapor" src="img/humo.png" alt="">
        <img class="persona" src="img/PERSONA 2.png" alt="">
        <img class="paisaje" src="img/FONDO2.png" alt="">
        <img class="cielo" src="img/CIELO.jpg" alt="">
    </div>
</body>
<a href="../index.html">
    <button>VOLVER</button>
</a>
</html>
